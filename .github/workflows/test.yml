name: test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Tap checkout
        run: brew tap chattocorp/tap "$GITHUB_WORKSPACE"

      - name: Audit formula
        run: brew audit --formula chattocorp/tap/chatto

      - name: Style formula
        run: brew style chattocorp/tap/chatto

      - name: Install formula
        if: ${{ runner.os != 'macOS' || runner.arch == 'ARM64' }}
        run: brew install chattocorp/tap/chatto

      - name: Test formula
        if: ${{ runner.os != 'macOS' || runner.arch == 'ARM64' }}
        run: brew test chattocorp/tap/chatto
